  - AI Features:
    - ai-features/index.md
    - AI Insights: ai-features/ai-insights.md
    - AI Copilot: ai-features/ai-copilot.md

  - Operations:
    - operations/index.md
    - Offboarding: operations/offboarding.md
    - Renewals: operations/renewals.md
    - Benchmarks: operations/benchmarks.md
